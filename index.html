<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatini Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { background: '#050505', surface: '#0a0a0a', surface2: '#121212', surface3: '#1a1a1a' },
                    animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .glass-header { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); }
        .chart-bar { transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .typing-cursor::after { content: '▋'; animation: blink 1s step-start infinite; color: #6ee7b7; margin-left: 2px;}
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-background text-white font-sans h-screen flex flex-col overflow-hidden selection:bg-cyan-500/30">

    <header class="glass-header flex items-center justify-between px-4 md:px-6 py-4 border-b border-white/5 z-20 flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-cyan-500 to-purple-600 flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                <i class="ph-fill ph-hexagon text-white text-lg"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white/90">Chatini</h1>
        </div>
        <div id="model-selector" class="flex bg-black p-1 rounded-full border border-white/10 shadow-inner"></div>
    </header>

    <main id="chat-canvas" class="flex-1 overflow-y-auto px-4 md:px-20 lg:px-48 py-8 scroll-smooth z-10">
        <div id="message-container" class="max-w-4xl mx-auto space-y-8 pb-20"></div>
        
        <div id="processing-indicator" class="hidden max-w-4xl mx-auto flex gap-4 w-full justify-start animate-pulse mt-8">
            <div id="processing-icon-container" class="w-8 h-8 rounded-full bg-[#111] border border-white/10 flex items-center justify-center mt-1">
                <i id="processing-icon" class="ph-bold text-lg"></i>
            </div>
            <div class="pt-1.5 flex items-center gap-3 text-sm text-gray-500">
                <i class="ph ph-spinner animate-spin text-lg"></i>
                <span id="processing-text">Connecting to Oracle...</span>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-gradient-to-t from-background via-background to-transparent z-20 flex-shrink-0">
        <div class="max-w-3xl mx-auto relative group">
            <div id="input-glow" class="absolute -inset-0.5 rounded-2xl blur opacity-30 transition duration-1000 bg-purple-500/10"></div>
            <div class="relative flex items-end bg-[#0f0f0f] border border-white/10 rounded-2xl p-2 shadow-2xl focus-within:border-white/30 transition-colors">
                <textarea id="chat-input" placeholder="Message Chatini..." class="flex-1 max-h-48 min-h-[44px] bg-transparent text-white placeholder-gray-600 resize-none outline-none py-3 px-4 text-sm leading-relaxed" rows="1"></textarea>
                <button id="send-btn" class="p-3 m-1 rounded-xl flex items-center justify-center transition-all bg-white/5 text-gray-500 cursor-not-allowed">
                    <i id="send-icon" class="ph-bold ph-paper-plane-right text-lg transition-transform"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        const CONFIG = {
            models: {
                spark: { id: 'spark', name: 'Spark', icon: 'ph-lightning', color: 'text-amber-400', bg: 'bg-amber-400/10', glow: 'bg-amber-400/20' },
                flux: { id: 'flux', name: 'Flux', icon: 'ph-drop', color: 'text-cyan-400', bg: 'bg-cyan-400/10', glow: 'bg-cyan-400/20' },
                oracle: { id: 'oracle', name: 'Oracle', icon: 'ph-hexagon', color: 'text-purple-500', bg: 'bg-purple-500/10', glow: 'bg-purple-500/20' }
            }
        };

        let activeModelId = 'oracle';
        let isProcessing = false;
        let messages = [];
        
        const els = {
            selector: document.getElementById('model-selector'),
            container: document.getElementById('message-container'),
            canvas: document.getElementById('chat-canvas'),
            input: document.getElementById('chat-input'),
            sendBtn: document.getElementById('send-btn'),
            sendIcon: document.getElementById('send-icon'),
            indicator: document.getElementById('processing-indicator'),
            indicatorIcon: document.getElementById('processing-icon'),
            indicatorText: document.getElementById('processing-text'),
            inputGlow: document.getElementById('input-glow')
        };

        function renderModelSelector() {
            els.selector.innerHTML = '';
            Object.values(CONFIG.models).forEach(model => {
                const isActive = activeModelId === model.id;
                const btn = document.createElement('button');
                btn.className = `flex items-center gap-2 px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-300 ${isActive ? `${model.bg} ${model.color} shadow-sm` : 'text-gray-500 hover:text-gray-300 hover:bg-white/5'}`;
                btn.innerHTML = `<i class="${model.icon} ${isActive ? 'ph-fill animate-pulse-slow' : 'ph-bold'} text-base"></i> ${model.name}`;
                btn.onclick = () => { if(!isProcessing) { activeModelId = model.id; updateUIState(); } };
                els.selector.appendChild(btn);
            });
        }

        function updateUIState() {
            renderModelSelector();
            const model = CONFIG.models[activeModelId];
            els.inputGlow.className = `absolute -inset-0.5 rounded-2xl blur opacity-30 transition duration-1000 ${model.glow}`;
            els.input.placeholder = `Message Chatini (${model.name} Engine)...`;
            
            const text = els.input.value.trim();
            if (text && !isProcessing) {
                els.sendBtn.className = 'p-3 m-1 rounded-xl flex items-center justify-center transition-all bg-white text-black hover:scale-105 shadow-[0_0_15px_rgba(255,255,255,0.3)]';
                els.sendIcon.classList.add('translate-x-0.5', '-translate-y-0.5');
            } else {
                els.sendBtn.className = 'p-3 m-1 rounded-xl flex items-center justify-center transition-all bg-white/5 text-gray-500 cursor-not-allowed';
                els.sendIcon.classList.remove('translate-x-0.5', '-translate-y-0.5');
            }
        }

        function parseRichText(content, isStreaming = false) {
            let html = content.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-semibold">$1</strong>');
            
            if (isStreaming && html.includes('<chart>') && !html.includes('</chart>')) {
                html = html.substring(0, html.indexOf('<chart>'));
                html += `<div class="mt-4 p-4 border border-cyan-500/30 bg-cyan-500/5 rounded-lg text-cyan-400 text-xs flex items-center gap-2 animate-pulse"><i class="ph ph-circle-notch animate-spin"></i> Rendering Live Data Visualization...</div>`;
                return html;
            }

            html = html.replace(/<chart>([\s\S]*?)<\/chart>/g, (match, jsonStr) => {
                try {
                    const data = JSON.parse(jsonStr);
                    const maxVal = Math.max(...data.map(d => d.value));
                    const barsHtml = data.map(item => `
                        <div class="flex-1 flex flex-col items-center gap-2 group">
                            <div class="w-full bg-gradient-to-t from-cyan-900/40 to-cyan-400 rounded-t-sm transition-all duration-1000 ease-out group-hover:to-cyan-300 relative chart-bar" style="height: ${(item.value / maxVal) * 100}%">
                                <div class="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-white text-black text-xs font-bold py-1 px-2 rounded transition-opacity">
                                    ${item.value}
                                </div>
                            </div>
                            <span class="text-[10px] text-gray-500 font-medium truncate w-full text-center">${item.label}</span>
                        </div>
                    `).join('');

                    return `<div class="w-full mt-4 p-5 bg-surface2 border border-white/5 rounded-xl shadow-2xl overflow-hidden">
                        <div class="flex items-center gap-2 mb-6 text-[10px] font-semibold tracking-widest text-gray-400 uppercase">
                            <i class="ph-bold ph-chart-bar text-cyan-400 text-sm"></i> Live AI Analysis
                        </div>
                        <div class="flex items-end h-32 gap-2 chart-container">${barsHtml}</div>
                    </div>`;
                } catch (e) {
                    return ``; 
                }
            });
            return html;
        }

        function appendMessage(role, content, modelId) {
            const isUser = role === 'user';
            const div = document.createElement('div');
            div.className = `flex w-full mb-8 ${isUser ? 'justify-end' : 'justify-start'}`;
            
            if (isUser) {
                div.innerHTML = `<div class="max-w-[80%] bg-surface3 border border-white/10 px-5 py-4 rounded-2xl rounded-tr-sm text-gray-100 shadow-md whitespace-pre-wrap">${content}</div>`;
            } else {
                const model = CONFIG.models[modelId];
                div.innerHTML = `
                    <div class="flex gap-4 max-w-[90%] w-full">
                        <div class="w-8 h-8 flex-shrink-0 rounded-full bg-[#111] border border-white/10 flex items-center justify-center mt-1 shadow-[0_0_10px_rgba(255,255,255,0.05)]">
                            <i class="${model.icon} ph-fill ${model.color} text-base"></i>
                        </div>
                        <div class="msg-content flex flex-col pt-1.5 w-full space-y-2 leading-relaxed text-gray-200 text-[15px]">
                            ${parseRichText(content)}
                        </div>
                    </div>
                `;
            }
            els.container.appendChild(div);
            els.canvas.scrollTop = els.canvas.scrollHeight;
            return div.querySelector('.msg-content');
        }

        async function handleSend() {
            const text = els.input.value.trim();
            if (!text || isProcessing) return;

            messages.push({ role: 'user', content: text });
            appendMessage('user', text);
            
            els.input.value = '';
            els.input.style.height = 'auto';
            isProcessing = true;
            updateUIState();

            const currentModel = CONFIG.models[activeModelId];
            els.indicatorIcon.className = `${currentModel.icon} ph-fill ${currentModel.color}`;
            els.indicatorText.textContent = `Orchestrating ${currentModel.name}...`;
            els.indicator.classList.remove('hidden');
            els.canvas.scrollTop = els.canvas.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messages.slice(-5), modelId: activeModelId }) // Keep context short to save free tier tokens
                });

                els.indicator.classList.add('hidden');
                const contentContainer = appendMessage('assistant', '', activeModelId);
                contentContainer.classList.add('typing-cursor');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') continue;
                            try {
                                const data = JSON.parse(dataStr);
                                
                                // Intercept explicit API errors passed from Edge function
                                if (data.ui_error) {
                                    fullResponse = `<span class="text-red-400"><i class="ph-bold ph-warning-circle"></i> ${data.ui_error}</span>`;
                                    contentContainer.innerHTML = fullResponse;
                                    break;
                                }

                                let textChunk = "";
                                if (data.choices && data.choices[0].delta.content) textChunk = data.choices[0].delta.content;
                                else if (data.candidates && data.candidates[0].content.parts[0].text) textChunk = data.candidates[0].content.parts[0].text;
                                
                                fullResponse += textChunk;
                                contentContainer.innerHTML = parseRichText(fullResponse, true);
                                els.canvas.scrollTop = els.canvas.scrollHeight;
                            } catch (e) { }
                        }
                    }
                }
                
                contentContainer.classList.remove('typing-cursor');
                contentContainer.innerHTML = parseRichText(fullResponse, false); 
                messages.push({ role: 'assistant', content: fullResponse });

            } catch (error) {
                els.indicator.classList.add('hidden');
                appendMessage('assistant', `<span class="text-red-400">Network Error: Failed to connect to server.</span>`, activeModelId);
            }

            isProcessing = false;
            updateUIState();
        }

        els.input.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; updateUIState(); });
        els.input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
        els.sendBtn.addEventListener('click', handleSend);
        
        updateUIState();
        appendMessage('assistant', 'System Initialized securely via Edge. How may I assist you today?', 'oracle');
    </script>
</body>
</html>
