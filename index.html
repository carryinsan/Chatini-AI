<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatini Premium</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { background: '#050505', surface: '#0a0a0a', surface2: '#121212', surface3: '#1a1a1a' },
                    animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .glass-header { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .chart-bar { transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .typing-cursor::after { content: '▋'; animation: blink 1s step-start infinite; color: #6ee7b7; margin-left: 2px;}
        @keyframes blink { 50% { opacity: 0; } }
        
        .prose pre { background-color: #121212 !important; border: 1px solid rgba(255,255,255,0.1); }
        .prose code { color: #a5b4fc !important; background: rgba(255,255,255,0.05); padding: 2px 4px; border-radius: 4px; font-weight: normal; }
        .prose code::before, .prose code::after { content: "" !important; }
        .prose strong { color: #fff !important; }
    </style>
</head>
<body class="bg-background text-white font-sans h-screen flex flex-col overflow-hidden selection:bg-cyan-500/30">

    <!-- SIDEBAR OVERLAY -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity" onclick="toggleSidebar()"></div>
    
    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 glass-header transform -translate-x-full transition-transform duration-300 z-50 flex flex-col border-r border-white/10 shadow-2xl">
        <div class="p-4 border-b border-white/10 flex justify-between items-center">
            <h2 class="text-sm font-bold tracking-widest text-gray-300 uppercase">Chat History</h2>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="p-4">
            <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 py-2 rounded-lg text-sm transition-colors">
                <i class="ph-bold ph-plus"></i> New Conversation
            </button>
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto px-2 space-y-1 pb-4">
            <!-- Populated by JS -->
        </div>
    </aside>

    <!-- MAIN HEADER -->
    <header class="glass-header flex items-center justify-between px-4 md:px-6 py-4 border-b border-white/5 z-20 flex-shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white transition-colors"><i class="ph-bold ph-list text-xl"></i></button>
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-cyan-500 to-purple-600 flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                    <i class="ph-fill ph-hexagon text-white text-lg"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white/90">Chatini</h1>
            </div>
        </div>
        <div id="model-selector" class="flex bg-black p-1 rounded-full border border-white/10 shadow-inner hidden md:flex"></div>
    </header>

    <!-- CHAT CANVAS -->
    <main id="chat-canvas" class="flex-1 overflow-y-auto px-4 md:px-20 lg:px-48 py-8 scroll-smooth z-10 relative">
        <div id="message-container" class="max-w-4xl mx-auto space-y-8 pb-20"></div>
        
        <div id="processing-indicator" class="hidden max-w-4xl mx-auto flex gap-4 w-full justify-start animate-pulse mt-8">
            <div id="processing-icon-container" class="w-8 h-8 rounded-full bg-[#111] border border-white/10 flex items-center justify-center mt-1">
                <i id="processing-icon" class="ph-bold text-lg"></i>
            </div>
            <div class="pt-1.5 flex items-center gap-3 text-sm text-gray-500">
                <i class="ph ph-spinner animate-spin text-lg"></i>
                <span id="processing-text">Orchestrating...</span>
            </div>
        </div>
    </main>

    <!-- INPUT AREA -->
    <footer class="p-4 bg-gradient-to-t from-background via-background to-transparent z-20 flex-shrink-0">
        <div class="max-w-3xl mx-auto relative group">
            <div id="input-glow" class="absolute -inset-0.5 rounded-2xl blur opacity-30 transition duration-1000 bg-purple-500/10"></div>
            <div class="relative flex items-end bg-[#0f0f0f] border border-white/10 rounded-2xl p-2 shadow-2xl focus-within:border-white/30 transition-colors">
                <textarea id="chat-input" placeholder="Message Chatini..." class="flex-1 max-h-48 min-h-[44px] bg-transparent text-white placeholder-gray-600 resize-none outline-none py-3 px-4 text-sm leading-relaxed" rows="1"></textarea>
                <button id="send-btn" class="p-3 m-1 rounded-xl flex items-center justify-center transition-all bg-white/5 text-gray-500 cursor-not-allowed">
                    <i id="send-icon" class="ph-bold ph-paper-plane-right text-lg transition-transform"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        marked.setOptions({ breaks: true, gfm: true });

        const CONFIG = {
            models: {
                spark: { id: 'spark', name: 'Spark', icon: 'ph-lightning', color: 'text-amber-400', bg: 'bg-amber-400/10', glow: 'bg-amber-400/20' },
                flux: { id: 'flux', name: 'Flux', icon: 'ph-drop', color: 'text-cyan-400', bg: 'bg-cyan-400/10', glow: 'bg-cyan-400/20' },
                oracle: { id: 'oracle', name: 'Oracle', icon: 'ph-hexagon', color: 'text-purple-500', bg: 'bg-purple-500/10', glow: 'bg-purple-500/20' }
            }
        };

        // State Management
        let activeModelId = 'oracle';
        let isProcessing = false;
        let currentChatId = Date.now().toString();
        let chats = JSON.parse(localStorage.getItem('chatini_sessions')) || [];
        
        let messages = [];

        const els = {
            selector: document.getElementById('model-selector'),
            container: document.getElementById('message-container'),
            canvas: document.getElementById('chat-canvas'),
            input: document.getElementById('chat-input'),
            sendBtn: document.getElementById('send-btn'),
            sendIcon: document.getElementById('send-icon'),
            indicator: document.getElementById('processing-indicator'),
            indicatorIcon: document.getElementById('processing-icon'),
            indicatorText: document.getElementById('processing-text'),
            inputGlow: document.getElementById('input-glow'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebar-overlay'),
            historyList: document.getElementById('history-list')
        };

        // --- SIDEBAR & LOCAL STORAGE LOGIC ---
        function toggleSidebar() {
            const isClosed = els.sidebar.classList.contains('-translate-x-full');
            if (isClosed) {
                els.sidebar.classList.remove('-translate-x-full');
                els.sidebarOverlay.classList.remove('hidden');
                renderHistoryList();
            } else {
                els.sidebar.classList.add('-translate-x-full');
                els.sidebarOverlay.classList.add('hidden');
            }
        }

        function saveCurrentChat() {
            if (messages.length === 0) return;
            const chatIndex = chats.findIndex(c => c.id === currentChatId);
            
            // Auto-generate title from first user message if new
            let title = "New Conversation";
            const firstUserMsg = messages.find(m => m.role === 'user');
            if (firstUserMsg) title = firstUserMsg.content.substring(0, 30) + (firstUserMsg.content.length > 30 ? '...' : '');

            const chatData = { id: currentChatId, title: chatIndex > -1 ? chats[chatIndex].title : title, messages: messages, date: Date.now() };

            if (chatIndex > -1) chats[chatIndex] = chatData;
            else chats.unshift(chatData);

            localStorage.setItem('chatini_sessions', JSON.stringify(chats));
        }

        function createNewChat() {
            currentChatId = Date.now().toString();
            messages = [];
            renderMessagesToUI();
            toggleSidebar();
            appendMessage('assistant', 'System Initialized securely. New chat created. How may I assist you today?', activeModelId, 'init');
        }

        function loadChat(id) {
            const chat = chats.find(c => c.id === id);
            if (chat) {
                currentChatId = chat.id;
                messages = chat.messages;
                renderMessagesToUI();
                toggleSidebar();
            }
        }

        function deleteChat(id, e) {
            e.stopPropagation();
            chats = chats.filter(c => c.id !== id);
            localStorage.setItem('chatini_sessions', JSON.stringify(chats));
            if (currentChatId === id) createNewChat();
            else renderHistoryList();
        }

        function renameChat(id, e) {
            e.stopPropagation();
            const chat = chats.find(c => c.id === id);
            const newName = prompt("Rename chat:", chat.title);
            if (newName) {
                chat.title = newName;
                localStorage.setItem('chatini_sessions', JSON.stringify(chats));
                renderHistoryList();
            }
        }

        function renderHistoryList() {
            els.historyList.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-3 rounded-lg cursor-pointer transition-colors ${chat.id === currentChatId ? 'bg-white/10' : 'hover:bg-white/5'}`;
                div.onclick = () => loadChat(chat.id);
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i class="ph ph-chat-circle text-gray-500 flex-shrink-0"></i>
                        <span class="text-sm text-gray-300 truncate">${chat.title}</span>
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="renameChat('${chat.id}', event)" class="text-gray-500 hover:text-white"><i class="ph-bold ph-pencil-simple"></i></button>
                        <button onclick="deleteChat('${chat.id}', event)" class="text-red-500 hover:text-red-400"><i class="ph-bold ph-trash"></i></button>
                    </div>
                `;
                els.historyList.appendChild(div);
            });
        }

        // --- EDIT & RESEND LOGIC ---
        function editMessage(msgId) {
            if(isProcessing) return;
            const msgIndex = messages.findIndex(m => m.id === msgId);
            if (msgIndex === -1) return;
            
            // Put text back in input
            els.input.value = messages[msgIndex].content;
            
            // Trim history (remove this message and all after it)
            messages = messages.slice(0, msgIndex);
            
            // Re-render
            renderMessagesToUI();
            els.input.focus();
            
            // Trigger input resize
            els.input.style.height = 'auto';
            els.input.style.height = (els.input.scrollHeight) + 'px';
            updateUIState();
        }


        // --- UI & PARSER LOGIC ---
        function renderModelSelector() {
            els.selector.innerHTML = '';
            Object.values(CONFIG.models).forEach(model => {
                const isActive = activeModelId === model.id;
                const btn = document.createElement('button');
                btn.className = `flex items-center gap-2 px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-300 ${isActive ? `${model.bg} ${model.color} shadow-sm` : 'text-gray-500 hover:text-gray-300 hover:bg-white/5'}`;
                btn.innerHTML = `<i class="${model.icon} ${isActive ? 'ph-fill animate-pulse-slow' : 'ph-bold'} text-base"></i> ${model.name}`;
                btn.onclick = () => { if(!isProcessing) { activeModelId = model.id; updateUIState(); } };
                els.selector.appendChild(btn);
            });
        }

        function updateUIState() {
            renderModelSelector();
            const model = CONFIG.models[activeModelId];
            els.inputGlow.className = `absolute -inset-0.5 rounded-2xl blur opacity-30 transition duration-1000 ${model.glow}`;
            els.input.placeholder = `Message Chatini (${model.name} Engine)...`;
            
            const text = els.input.value.trim();
            if (text && !isProcessing) {
                els.sendBtn.className = 'p-3 m-1 rounded-xl flex items-center justify-center transition-all bg-white text-black hover:scale-105 shadow-[0_0_15px_rgba(255,255,255,0.3)]';
                els.sendIcon.classList.add('translate-x-0.5', '-translate-y-0.5');
            } else {
                els.sendBtn.className = 'p-3 m-1 rounded-xl flex items-center justify-center transition-all bg-white/5 text-gray-500 cursor-not-allowed';
                els.sendIcon.classList.remove('translate-x-0.5', '-translate-y-0.5');
            }
        }

        function parseRichText(content, isStreaming = false) {
            let extractedHtml = '';
            let markdownContent = content;

            markdownContent = markdownContent.replace(/<sources>([\s\S]*?)(<\/sources>|$)/g, (match, jsonStr, closeTag) => {
                if (!closeTag) return `<div class="animate-pulse text-purple-400 text-xs mt-2"><i class="ph ph-circle-notch animate-spin"></i> Digging into sources...</div>`;
                try {
                    const cleanJson = jsonStr.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const sources = JSON.parse(cleanJson);
                    const chipsHtml = sources.map(s => `
                        <a href="${s.url}" target="_blank" class="inline-flex items-center gap-2 bg-surface2 hover:bg-surface3 border border-white/5 px-3 py-1.5 rounded-lg transition-colors group text-decoration-none">
                            <i class="ph-bold ph-globe text-gray-500 group-hover:text-cyan-400"></i>
                            <span class="text-xs text-gray-300 group-hover:text-white truncate max-w-[150px]">${s.title}</span>
                        </a>`).join('');
                    extractedHtml += `<div class="mt-4 pt-4 border-t border-white/5"><div class="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-widest"><i class="ph-bold ph-link text-purple-400"></i> Chatini's Sources</div><div class="flex flex-wrap gap-2">${chipsHtml}</div></div>`;
                } catch (e) { } return '';
            });

            markdownContent = markdownContent.replace(/<chart>([\s\S]*?)(<\/chart>|$)/g, (match, jsonStr, closeTag) => {
                if (!closeTag) return `<div class="mt-4 p-4 border border-cyan-500/30 bg-cyan-500/5 rounded-lg text-cyan-400 text-xs flex items-center gap-2 animate-pulse"><i class="ph ph-circle-notch animate-spin"></i> Rendering Live Data...</div>`;
                try {
                    const cleanJson = jsonStr.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const data = JSON.parse(cleanJson);
                    const maxVal = Math.max(...data.map(d => d.value));
                    const barsHtml = data.map(item => `
                        <div class="flex-1 flex flex-col items-center gap-2 group">
                            <div class="w-full bg-gradient-to-t from-cyan-900/40 to-cyan-400 rounded-t-sm transition-all duration-1000 ease-out group-hover:to-cyan-300 relative chart-bar" style="height: ${(item.value / maxVal) * 100}%">
                                <div class="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-white text-black text-xs font-bold py-1 px-2 rounded transition-opacity">${item.value}</div>
                            </div>
                            <span class="text-[10px] text-gray-500 font-medium truncate w-full text-center">${item.label}</span>
                        </div>
                    `).join('');
                    extractedHtml += `<div class="w-full mt-4 mb-4 p-5 bg-surface2 border border-white/5 rounded-xl shadow-2xl overflow-hidden">
                        <div class="flex items-center gap-2 mb-6 text-[10px] font-semibold tracking-widest text-gray-400 uppercase"><i class="ph-bold ph-chart-bar text-cyan-400 text-sm"></i> Live Analysis</div>
                        <div class="flex items-end h-32 gap-2 chart-container">${barsHtml}</div>
                    </div>`;
                } catch (e) { } return '';
            });

            const renderedMarkdown = marked.parse(markdownContent);
            return `<div class="prose prose-invert prose-sm md:prose-base max-w-none leading-relaxed text-gray-200">${renderedMarkdown}</div>${extractedHtml}${!isStreaming && markdownContent.trim().length > 0 ? `<div class="mt-2 text-emerald-500 text-[10px] flex items-center justify-end gap-1 opacity-50"><i class="ph-bold ph-check-circle"></i> Chatini Completed</div>` : ''}`;
        }

        function appendMessage(role, content, modelId, specificId = null) {
            const isUser = role === 'user';
            const msgId = specificId || Date.now().toString();
            
            const div = document.createElement('div');
            div.className = `flex w-full mb-8 ${isUser ? 'justify-end' : 'justify-start'}`;
            
            if (isUser) {
                div.innerHTML = `
                    <div class="group flex gap-3 max-w-[80%] items-center">
                        <button onclick="editMessage('${msgId}')" class="opacity-0 group-hover:opacity-100 p-2 rounded-full hover:bg-white/10 text-gray-400 hover:text-white transition-all flex-shrink-0" title="Edit and Resend">
                            <i class="ph-bold ph-pencil-simple text-sm"></i>
                        </button>
                        <div class="bg-surface3 border border-white/10 px-5 py-4 rounded-2xl rounded-tr-sm text-gray-100 shadow-md whitespace-pre-wrap">${content}</div>
                    </div>`;
            } else {
                const model = CONFIG.models[modelId] || CONFIG.models.oracle;
                div.innerHTML = `
                    <div class="flex gap-4 max-w-[90%] w-full">
                        <div class="w-8 h-8 flex-shrink-0 rounded-full bg-[#111] border border-white/10 flex items-center justify-center mt-1 shadow-[0_0_10px_rgba(255,255,255,0.05)]">
                            <i class="${model.icon} ph-fill ${model.color} text-base"></i>
                        </div>
                        <div class="msg-content flex flex-col pt-1.5 w-full min-w-0">${parseRichText(content, false)}</div>
                    </div>`;
            }
            els.container.appendChild(div);
            els.canvas.scrollTop = els.canvas.scrollHeight;
            return { container: div.querySelector('.msg-content'), id: msgId };
        }

        function renderMessagesToUI() {
            els.container.innerHTML = '';
            messages.forEach(msg => appendMessage(msg.role, msg.content, msg.modelId, msg.id));
        }

        async function handleSend() {
            const text = els.input.value.trim();
            if (!text || isProcessing) return;

            const userMsgObj = appendMessage('user', text);
            messages.push({ role: 'user', content: text, id: userMsgObj.id });
            
            els.input.value = '';
            els.input.style.height = 'auto';
            isProcessing = true;
            updateUIState();

            const currentModel = CONFIG.models[activeModelId];
            els.indicatorIcon.className = `${currentModel.icon} ph-fill ${currentModel.color}`;
            els.indicatorText.textContent = `Chatini is typing...`;
            els.indicator.classList.remove('hidden');
            els.canvas.scrollTop = els.canvas.scrollHeight;

            try {
                // Slicing last 20 messages for deep context without breaking tokens
                const contextMessages = messages.map(m => ({role: m.role, content: m.content}));
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: contextMessages.slice(-20), modelId: activeModelId }) 
                });

                els.indicator.classList.add('hidden');
                const assistantMsgObj = appendMessage('assistant', '', activeModelId);
                const contentContainer = assistantMsgObj.container;
                contentContainer.classList.add('typing-cursor');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (value) {
                        buffer += decoder.decode(value, { stream: true });
                        let lines = buffer.split('\n');
                        buffer = lines.pop(); 

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const dataStr = line.slice(6).trim();
                                if (dataStr === '[DONE]') continue;
                                try {
                                    const data = JSON.parse(dataStr);
                                    if (data.ui_error) {
                                        fullResponse = `<span class="text-red-400"><i class="ph-bold ph-warning-circle"></i> ${data.ui_error}</span>`;
                                        contentContainer.innerHTML = fullResponse;
                                        break;
                                    }

                                    let textChunk = "";
                                    if (data.choices && data.choices[0].delta.content) textChunk = data.choices[0].delta.content;
                                    else if (data.candidates && data.candidates[0].content.parts[0].text) textChunk = data.candidates[0].content.parts[0].text;
                                    
                                    fullResponse += textChunk;
                                    contentContainer.innerHTML = parseRichText(fullResponse, true);
                                    els.canvas.scrollTop = els.canvas.scrollHeight;
                                } catch (e) { }
                            }
                        }
                    }
                    if (done) break;
                }
                
                contentContainer.classList.remove('typing-cursor');
                contentContainer.innerHTML = parseRichText(fullResponse, false); 
                messages.push({ role: 'assistant', content: fullResponse, id: assistantMsgObj.id, modelId: activeModelId });
                saveCurrentChat(); // Auto-save after response

            } catch (error) {
                els.indicator.classList.add('hidden');
                appendMessage('assistant', `<span class="text-red-400">Network Error. Check your connection.</span>`, activeModelId);
            }

            isProcessing = false;
            updateUIState();
        }

        els.input.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; updateUIState(); });
        els.input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
        els.sendBtn.addEventListener('click', handleSend);
        
        // Initial setup
        updateUIState();
        if(chats.length > 0) loadChat(chats[0].id); // Load most recent chat on refresh
        else createNewChat();

    </script>
</body>
</html>
