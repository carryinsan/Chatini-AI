<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chatini Workspace</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { background: '#050505', surface: '#0a0a0a', surface2: '#121212', surface3: '#1a1a1a' }, animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-header { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .chart-bar { transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .typing-cursor::after { content: '▋'; animation: blink 1s step-start infinite; color: #6ee7b7; margin-left: 2px;}
        @keyframes blink { 50% { opacity: 0; } }
        .prose { max-width: 100% !important; overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; }
        .prose pre { background-color: #121212 !important; border: 1px solid rgba(255,255,255,0.1); overflow-x: auto; max-width: 100%; padding: 1rem; border-radius: 0.5rem; }
        .prose code { color: #a5b4fc !important; background: rgba(255,255,255,0.05); padding: 2px 4px; border-radius: 4px; font-weight: normal; word-break: break-all; }
        .prose code::before, .prose code::after { content: "" !important; }
        .prose strong { color: #fff !important; }
        .prose p, .prose ul, .prose ol { margin-bottom: 0.75em; }
        .terminal-text { font-family: 'Courier New', Courier, monospace; }
        #workspace-canvas { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), width 0.4s ease; }
    </style>
</head>
<body class="bg-background text-white font-sans h-[100dvh] w-full flex flex-col overflow-hidden selection:bg-cyan-500/30 relative">

    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-cyan-500 text-black px-6 py-2.5 rounded-full text-sm font-bold shadow-[0_0_15px_rgba(6,182,212,0.5)] transition-all duration-300 opacity-0 -translate-y-10 z-[80] pointer-events-none flex items-center gap-2">
        <i class="ph-bold ph-check"></i> <span id="toast-msg">Copied!</span>
    </div>

    <!-- Modals -->
    <div id="pdf-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center backdrop-blur-sm px-4">
        <div class="bg-[#0a0a0a] border border-white/10 p-6 rounded-3xl w-full max-w-sm shadow-2xl">
            <h3 class="text-white font-bold mb-5 flex items-center gap-2 text-lg"><i class="ph-fill ph-file-pdf text-red-400 text-xl"></i> Export Response</h3>
            <div class="space-y-5">
                <div><label class="text-xs text-gray-400 mb-1.5 block uppercase tracking-wider font-semibold">File Name</label><input type="text" id="pdf-filename" value="Chatini_Analysis" class="w-full bg-[#111] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-cyan-500"></div>
                <label class="flex items-center gap-3 cursor-pointer p-3 bg-white/5 rounded-xl border border-white/5 hover:bg-white/10"><input type="checkbox" id="pdf-include-sources" checked class="w-4 h-4 rounded bg-black border-white/20 text-cyan-500 accent-cyan-500"><span class="text-sm text-gray-300 font-medium">Include Sources & Charts</span></label>
                <div class="flex gap-3 pt-2"><button onclick="closePdfModal()" class="flex-1 py-3 rounded-xl text-sm font-medium text-gray-400 hover:bg-white/5">Cancel</button><button onclick="generatePdf()" id="pdf-dl-btn" class="flex-1 py-3 rounded-xl text-sm font-bold bg-gradient-to-r from-cyan-600 to-cyan-500 text-white shadow-lg flex items-center justify-center gap-2"><i class="ph-bold ph-download-simple"></i> Download</button></div>
            </div>
        </div>
    </div>

    <div id="ext-modal" class="fixed inset-0 bg-black/90 z-[70] hidden flex flex-col backdrop-blur-md">
        <div class="flex items-center justify-between p-4 sm:p-6 border-b border-white/10 glass-header pt-safe">
            <h2 class="text-lg sm:text-xl font-bold flex items-center gap-2"><i class="ph-fill ph-brain text-purple-400 text-2xl"></i> Knowledge Extensions</h2>
            <button onclick="closeExtModal()" class="text-gray-400 hover:text-white bg-white/5 p-2 rounded-full"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 sm:p-6 flex flex-col md:flex-row gap-6 max-w-7xl mx-auto w-full">
            <div class="w-full md:w-1/3 flex flex-col gap-4 border-b md:border-b-0 md:border-r border-white/10 pb-6 md:pb-0 md:pr-6">
                <button onclick="openCreateExtForm()" class="w-full py-4 rounded-2xl border border-dashed border-purple-500/50 text-purple-400 hover:bg-purple-500/10 hover:border-purple-500 transition-all font-bold flex items-center justify-center gap-2"><i class="ph-bold ph-plus"></i> Create New Extension</button>
                <div id="ext-list" class="flex flex-col gap-2 overflow-y-auto"></div>
            </div>
            <div id="ext-form-area" class="w-full md:w-2/3 hidden flex-col gap-6">
                <input type="hidden" id="ext-id">
                <div><label class="text-xs text-gray-400 mb-2 block uppercase tracking-wider font-semibold">Extension Name</label><input type="text" id="ext-name" placeholder="e.g., Q3 Financial Reports" class="w-full bg-[#111] border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-purple-500"></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-surface2 p-4 rounded-2xl border border-white/5">
                        <label class="text-xs text-gray-400 mb-2 flex justify-between uppercase tracking-wider font-semibold"><span>Public Links</span> <span class="text-cyan-400 text-[10px]">Max 200</span></label>
                        <div class="flex gap-2 mb-3"><input type="url" id="ext-link-input" placeholder="https://..." class="flex-1 bg-[#0a0a0a] border border-white/10 rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-cyan-500"><button onclick="addExtLink()" id="ext-link-btn" class="bg-cyan-500/20 text-cyan-400 px-3 rounded-lg hover:bg-cyan-500/30 transition-colors flex items-center justify-center min-w-[40px]"><i class="ph-bold ph-plus"></i></button></div>
                        <div id="ext-link-list" class="flex flex-col gap-2 max-h-48 overflow-y-auto pr-1"></div>
                    </div>
                    <div class="bg-surface2 p-4 rounded-2xl border border-white/5">
                        <label class="text-xs text-gray-400 mb-2 flex justify-between uppercase tracking-wider font-semibold"><span>Documents</span> <span class="text-purple-400 text-[10px]">Max 20</span></label>
                        <input type="file" id="ext-file-input" multiple class="hidden" accept=".pdf,.doc,.docx,.txt,.html,.py,.csv">
                        <button onclick="document.getElementById('ext-file-input').click()" class="w-full py-2 mb-3 border border-white/10 rounded-lg text-sm text-gray-300 hover:bg-white/5 transition-colors flex items-center justify-center gap-2"><i class="ph-bold ph-upload-simple"></i> Select Files</button>
                        <div id="ext-file-list" class="flex flex-col gap-2 max-h-48 overflow-y-auto pr-1"></div>
                    </div>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-white/10"><button onclick="closeExtForm()" class="px-6 py-3 rounded-xl text-sm font-medium text-gray-400 hover:bg-white/5">Cancel</button><button onclick="saveExtension()" class="px-8 py-3 rounded-xl text-sm font-bold bg-purple-600 text-white hover:bg-purple-500 shadow-lg flex items-center gap-2"><i class="ph-bold ph-floppy-disk"></i> Save Extension</button></div>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden transition-opacity backdrop-blur-sm" onclick="toggleSidebar()"></div>
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-[80vw] max-w-xs glass-header transform -translate-x-full transition-transform duration-300 z-50 flex flex-col border-r border-white/10 shadow-2xl">
        <div class="p-4 border-b border-white/10 flex justify-between items-center mt-safe">
            <h2 class="text-xs font-bold tracking-widest text-gray-400 uppercase">Chat History</h2>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white p-2"><i class="ph-bold ph-x text-lg"></i></button>
        </div>
        <div class="p-4 space-y-3 border-b border-white/10">
            <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 py-2.5 rounded-xl text-sm font-medium transition-colors"><i class="ph-bold ph-plus"></i> New Conversation</button>
            <button onclick="openExtModal()" class="w-full flex items-center justify-center gap-2 bg-purple-500/10 hover:bg-purple-500/20 border border-purple-500/20 text-purple-400 py-2.5 rounded-xl text-sm font-medium transition-colors"><i class="ph-bold ph-brain"></i> Manage Extensions</button>
            <div class="relative w-full">
                <select id="chat-ext-selector" onchange="assignExtToCurrentChat()" class="w-full bg-[#0a0a0a] border border-white/10 rounded-lg px-3 py-2 text-xs text-gray-300 outline-none appearance-none cursor-pointer hover:border-white/20 transition-colors">
                    <option value="">No Extension Active</option>
                </select>
                <i class="ph-bold ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none text-xs"></i>
            </div>
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto px-2 space-y-1 pb-safe pt-2"></div>
    </aside>

    <header class="glass-header w-full flex flex-col sm:flex-row items-center justify-between px-3 sm:px-6 py-3 border-b border-white/5 z-20 flex-shrink-0 gap-3 sm:gap-0 pt-safe">
        <div class="flex items-center justify-between w-full sm:w-auto">
            <div class="flex items-center gap-3 sm:gap-4">
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white transition-colors p-1"><i class="ph-bold ph-list text-2xl"></i></button>
                <div class="flex items-center gap-2.5">
                    <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-gradient-to-tr from-cyan-500 to-purple-600 flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                        <i class="ph-fill ph-hexagon text-white text-base sm:text-lg"></i>
                    </div>
                    <h1 class="text-lg sm:text-xl font-bold tracking-tight text-white/90">Chatini</h1>
                </div>
            </div>
        </div>
        
        <div class="w-full sm:w-auto overflow-x-auto no-scrollbar pb-1 sm:pb-0 flex items-center">
            <div class="flex items-center gap-2 w-max mx-auto sm:mx-0">
                <button id="deep-research-btn" onclick="toggleDeepResearch()" class="flex items-center gap-1.5 px-3 sm:px-4 py-1.5 rounded-full text-xs sm:text-sm font-medium border border-transparent text-gray-500 hover:text-cyan-400 bg-black/50 sm:bg-black shadow-inner transition-all duration-300" title="Auto-Pilot Deep Research">
                    <i id="deep-research-icon" class="ph-bold ph-radar text-sm sm:text-base"></i> <span class="">Deep Research</span>
                </button>
                <div id="model-selector" class="flex bg-black/50 sm:bg-black p-1 rounded-full border border-white/10 shadow-inner"></div>
            </div>
        </div>
    </header>

    <!-- SPLIT SCREEN LAYOUT CONTAINER -->
    <div class="flex-1 flex w-full overflow-hidden relative min-h-0">
        
        <!-- CHAT AREA -->
        <main id="chat-canvas" class="flex-1 h-full overflow-y-auto overflow-x-hidden px-2 sm:px-6 md:px-12 lg:px-24 xl:px-48 py-6 scroll-smooth z-10 min-h-0">
            <div id="message-container" class="max-w-4xl mx-auto space-y-6 sm:space-y-8 pb-10"></div>
            <div id="processing-indicator" class="hidden max-w-4xl mx-auto flex gap-3 sm:gap-4 w-full justify-start animate-pulse mt-6 sm:mt-8 px-2">
                <div id="processing-icon-container" class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-[#111] border border-white/10 flex items-center justify-center flex-shrink-0">
                    <i id="processing-icon" class="ph-bold text-base sm:text-lg"></i>
                </div>
                <div class="pt-1 flex items-center gap-2 sm:gap-3 text-xs sm:text-sm text-gray-500">
                    <i class="ph ph-spinner animate-spin text-base sm:text-lg"></i>
                    <span id="processing-text">Orchestrating...</span>
                </div>
            </div>
        </main>

        <!-- CANVAS WORKSPACE (RIGHT PANEL) -->
        <aside id="workspace-canvas" class="absolute inset-y-0 right-0 h-full min-h-0 w-full lg:static lg:w-1/2 bg-[#0a0a0a] border-l border-white/10 transform translate-x-full lg:translate-x-0 hidden flex-col shadow-2xl z-40 transition-transform">
            <div class="flex items-center justify-between p-4 border-b border-white/10 bg-[#111] flex-shrink-0">
                <div class="flex items-center gap-2">
                    <i class="ph-fill ph-layout text-cyan-400 text-lg"></i>
                    <h2 id="canvas-title" class="text-sm font-bold text-white truncate max-w-[200px]">Artifact</h2>
                </div>
                <div class="flex gap-2">
                    <button onclick="copyCanvasContent()" class="text-gray-400 hover:text-white bg-white/5 p-1.5 rounded text-xs flex items-center gap-1"><i class="ph-bold ph-copy"></i> Copy</button>
                    <button onclick="closeCanvas()" class="text-gray-400 hover:text-white bg-white/5 p-1.5 rounded"><i class="ph-bold ph-x"></i></button>
                </div>
            </div>
            <div id="canvas-content" class="flex-1 overflow-y-auto min-h-0 h-full p-6 lg:p-10 prose prose-invert max-w-none text-sm md:text-base selection:bg-cyan-500/30 pb-24"></div>
        </aside>
    </div>

    <footer class="w-full p-3 sm:p-4 bg-gradient-to-t from-[#050505] via-[#050505] to-transparent z-20 flex-shrink-0 pb-safe">
        <div class="max-w-4xl mx-auto relative group flex flex-col gap-2">
            <div id="staging-area" class="flex flex-wrap gap-2 empty:hidden"></div>
            <div id="input-glow" class="absolute -inset-0.5 rounded-2xl sm:rounded-3xl blur-md opacity-30 transition duration-1000 bg-purple-500/10 -z-10"></div>
            <div class="relative flex items-end bg-[#0f0f0f] border border-white/10 rounded-2xl sm:rounded-3xl p-1.5 sm:p-2 shadow-2xl focus-within:border-white/30 transition-colors">
                
                <input type="file" id="file-upload" multiple class="hidden" accept="image/*,.pdf,.txt,.html,.md,.csv,.doc,.docx">
                <button onclick="document.getElementById('file-upload').click()" class="p-2.5 sm:p-3 m-1 rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-colors flex-shrink-0" title="Attach Files (For current message)">
                    <i class="ph-bold ph-paperclip text-lg sm:text-xl"></i>
                </button>

                <textarea id="chat-input" placeholder="Message Chatini..." class="flex-1 max-h-[150px] sm:max-h-48 min-h-[40px] sm:min-h-[44px] bg-transparent text-white placeholder-gray-600 resize-none outline-none py-2.5 sm:py-3 px-1 sm:px-2 text-base leading-relaxed" rows="1"></textarea>
                
                <button id="send-btn" class="p-2.5 sm:p-3 m-1 rounded-xl sm:rounded-2xl flex items-center justify-center transition-all bg-white/5 text-gray-500 cursor-not-allowed flex-shrink-0">
                    <i id="send-icon" class="ph-bold ph-paper-plane-right text-lg sm:text-xl transition-transform"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        marked.setOptions({ breaks: true, gfm: true });

        const CONFIG = {
            models: {
                spark: { id: 'spark', name: 'Spark', icon: 'ph-lightning', color: 'text-amber-400', bg: 'bg-amber-400/10', glow: 'bg-amber-400/20' },
                flux: { id: 'flux', name: 'Flux', icon: 'ph-drop', color: 'text-cyan-400', bg: 'bg-cyan-400/10', glow: 'bg-cyan-400/20' },
                oracle: { id: 'oracle', name: 'Oracle', icon: 'ph-hexagon', color: 'text-purple-500', bg: 'bg-purple-500/10', glow: 'bg-purple-500/20' }
            }
        };

        const EXTENSION_MAP = {
            'txt': 'text/plain', 'md': 'text/markdown', 'csv': 'text/csv', 'html': 'text/html',
            'pdf': 'application/pdf', 'doc': 'application/msword', 'docx': 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
            'jpg': 'image/jpeg', 'jpeg': 'image/jpeg', 'png': 'image/png', 'webp': 'image/webp', 'py': 'text/plain'
        };

        const DB = {
            db: null,
            init: () => new Promise((resolve, reject) => {
                const req = indexedDB.open('ChatiniDB', 1);
                req.onupgradeneeded = e => { const db = e.target.result; if (!db.objectStoreNames.contains('extensions')) db.createObjectStore('extensions', { keyPath: 'id' }); };
                req.onsuccess = e => { DB.db = e.target.result; resolve(); }; req.onerror = e => reject(e);
            }),
            getAll: () => new Promise(resolve => { const tx = DB.db.transaction('extensions', 'readonly'); const req = tx.objectStore('extensions').getAll(); req.onsuccess = () => resolve(req.result || []); }),
            put: (ext) => new Promise(resolve => { const tx = DB.db.transaction('extensions', 'readwrite'); tx.objectStore('extensions').put(ext); tx.oncomplete = () => resolve(); }),
            delete: (id) => new Promise(resolve => { const tx = DB.db.transaction('extensions', 'readwrite'); tx.objectStore('extensions').delete(id); tx.oncomplete = () => resolve(); })
        };

        let activeModelId = 'oracle';
        let isProcessing = false;
        let isDeepResearchOn = false;
        let currentChatId = Date.now().toString();
        let chats = JSON.parse(localStorage.getItem('chatini_sessions')) || [];
        let messages = [];
        let pendingFiles = [];
        let currentChatExtId = null; 
        let extForm = { id: '', name: '', links: [], files: [] };
        
        window.ARTIFACT_STORE = {};

        const els = {
            selector: document.getElementById('model-selector'),
            container: document.getElementById('message-container'),
            canvas: document.getElementById('chat-canvas'),
            input: document.getElementById('chat-input'),
            sendBtn: document.getElementById('send-btn'),
            sendIcon: document.getElementById('send-icon'),
            indicator: document.getElementById('processing-indicator'),
            indicatorIcon: document.getElementById('processing-icon'),
            indicatorText: document.getElementById('processing-text'),
            inputGlow: document.getElementById('input-glow'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebar-overlay'),
            historyList: document.getElementById('history-list'),
            fileInput: document.getElementById('file-upload'),
            stagingArea: document.getElementById('staging-area'),
            extSelector: document.getElementById('chat-ext-selector'),
            workspace: document.getElementById('workspace-canvas'),
            canvasContent: document.getElementById('canvas-content'),
            canvasTitle: document.getElementById('canvas-title'),
            researchBtn: document.getElementById('deep-research-btn'),
            researchIcon: document.getElementById('deep-research-icon')
        };

        window.onload = async () => {
            await DB.init(); updateUIState(); refreshExtSelectors();
            if(chats.length > 0) loadChat(chats[0].id); else createNewChat();
        };

        function toggleDeepResearch() {
            isDeepResearchOn = !isDeepResearchOn;
            if (isDeepResearchOn) {
                els.researchBtn.classList.replace('text-gray-500', 'text-cyan-400');
                els.researchBtn.classList.replace('border-transparent', 'border-cyan-500/50');
                els.researchBtn.classList.add('bg-cyan-500/10');
                els.researchIcon.classList.add('animate-pulse');
                showToast("Auto-Pilot Engaged");
            } else {
                els.researchBtn.classList.replace('text-cyan-400', 'text-gray-500');
                els.researchBtn.classList.replace('border-cyan-500/50', 'border-transparent');
                els.researchBtn.classList.remove('bg-cyan-500/10');
                els.researchIcon.classList.remove('animate-pulse');
            }
        }

        function openCanvas(artifactId, title) {
            els.workspace.classList.remove('hidden');
            setTimeout(() => els.workspace.classList.remove('translate-x-full'), 10);
            els.canvasTitle.innerText = title || "Document Artifact";
            const rawMarkdown = window.ARTIFACT_STORE[artifactId] || "";
            els.canvasContent.innerHTML = marked.parse(rawMarkdown);
        }

        function closeCanvas() {
            els.workspace.classList.add('translate-x-full');
            setTimeout(() => els.workspace.classList.add('hidden'), 400); 
        }

        async function copyCanvasContent() {
            try {
                const text = els.canvasContent.innerText;
                if (navigator.clipboard && window.isSecureContext) await navigator.clipboard.writeText(text);
                else { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); t.remove(); }
                showToast("Artifact Copied!");
            } catch (e) { showToast("Failed"); }
        }

        function openExtModal() { document.getElementById('ext-modal').classList.remove('hidden'); renderExtList(); closeExtForm(); }
        function closeExtModal() { document.getElementById('ext-modal').classList.add('hidden'); refreshExtSelectors(); }
        function openCreateExtForm() { extForm = { id: Date.now().toString(), name: '', links: [], files: [] }; renderExtForm(); }
        function closeExtForm() { document.getElementById('ext-form-area').classList.add('hidden'); document.getElementById('ext-form-area').classList.remove('flex'); }

        async function renderExtList() {
            const list = document.getElementById('ext-list'); list.innerHTML = ''; const extensions = await DB.getAll();
            extensions.forEach(ext => { list.innerHTML += `<div class="bg-surface2 border border-white/10 p-3 rounded-xl flex items-center justify-between group"><div class="flex-1 truncate"><div class="text-sm text-gray-200 font-bold truncate">${ext.name}</div><div class="text-[10px] text-gray-500">${ext.links.length} Links • ${ext.files.length} Docs</div></div><div class="flex gap-2"><button onclick="editExt('${ext.id}')" class="text-gray-500 hover:text-white p-1 bg-white/5 rounded"><i class="ph-bold ph-pencil-simple"></i></button><button onclick="deleteExt('${ext.id}')" class="text-red-500 hover:text-red-400 p-1 bg-white/5 rounded"><i class="ph-bold ph-trash"></i></button></div></div>`; });
        }
        async function editExt(id) { const exts = await DB.getAll(); extForm = exts.find(e => e.id === id); renderExtForm(); }
        async function deleteExt(id) { if(confirm("Delete Extension?")) { await DB.delete(id); renderExtList(); if (currentChatExtId === id) { currentChatExtId = null; saveCurrentChat(); } refreshExtSelectors(); } }
        function renderExtForm() { document.getElementById('ext-form-area').classList.remove('hidden'); document.getElementById('ext-form-area').classList.add('flex'); document.getElementById('ext-name').value = extForm.name; renderExtLinks(); renderExtFiles(); }
        
        async function addExtLink() {
            if (extForm.links.length >= 200) return alert("Max 200 links allowed.");
            const input = document.getElementById('ext-link-input'); const url = input.value.trim(); if (!url) return;
            const btn = document.getElementById('ext-link-btn'); btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin"></i>`; btn.disabled = true;
            try { const res = await fetch('/api/scrape', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({url}) }); const data = await res.json();

        function parseRichText(content, isStreaming = false, msgId = null) {
            let extractedHtml = ''; let markdownContent = content;

            // 1. Extract Artifacts (Canvas Workspace)
            markdownContent = markdownContent.replace(/<artifact(?: title="([^"]+)")?>([\s\S]*?)(<\/artifact>|$)/g, (match, title, artifactContent, closeTag) => {
                if (!closeTag) return `<div class="mt-4 p-4 border border-cyan-500/30 bg-cyan-500/5 rounded-xl flex items-center justify-between animate-pulse"><div class="flex items-center gap-3"><i class="ph-bold ph-layout text-cyan-400 text-xl"></i><div><p class="text-xs text-cyan-400 font-bold uppercase tracking-wider">Generating Workspace...</p></div></div><i class="ph-bold ph-spinner animate-spin text-cyan-400"></i></div>`;
                const artId = 'art_' + Math.random().toString(36).substr(2, 9);
                window.ARTIFACT_STORE[artId] = artifactContent.trim();
                extractedHtml += `<div class="artifact-card mt-4 p-4 border border-white/10 bg-surface2 hover:bg-surface3 rounded-xl flex items-center justify-between cursor-pointer transition-colors shadow-lg group" onclick="openCanvas('${artId}', '${(title || 'Document').replace(/'/g, "\\'")}')"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-lg bg-cyan-500/10 flex items-center justify-center border border-cyan-500/20 group-hover:border-cyan-500/50 transition-colors"><i class="ph-fill ph-layout text-cyan-400 text-xl"></i></div><div><p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-0.5">Interactive Workspace</p><p class="text-sm text-white font-medium group-hover:text-cyan-400 transition-colors">${title || 'Untitled Artifact'}</p></div></div><i class="ph-bold ph-caret-right text-gray-500 group-hover:text-white transition-colors"></i></div>`;
                return '';

            // 2. Extract Sources
            markdownContent = markdownContent.replace(/<sources>([\s\S]*?)(<\/sources>|$)/g, (match, jsonStr, closeTag) => {
                if (!closeTag) return `<div class="animate-pulse text-purple-400 text-[10px] sm:text-xs mt-2"><i class="ph ph-circle-notch animate-spin"></i> Analyzing Sources...</div>`;
                try {
                    const cleanJson = jsonStr.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const chipsHtml = JSON.parse(cleanJson).map(s => `<a href="${s.url}" target="_blank" class="inline-flex items-center gap-1.5 sm:gap-2 px-3 py-1.5 bg-white/5 hover:bg-white/10 text-gray-300 rounded-xl border border-white/5 text-[10px] font-medium transition-colors"><i class="ph-bold ph-link text-purple-400"></i> ${s.title || s.name || 'Source'}</a>`).join('');
                    extractedHtml += `<div class="extra-data-block mt-3 sm:mt-4 pt-3 sm:pt-4 border-t border-white/5"><div class="text-[10px] font-semibold text-gray-500 mb-2 uppercase tracking-widest"><i class="ph-bold ph-link text-purple-400"></i> Sources & Files</div><div class="flex flex-wrap gap-2">${chipsHtml}</div></div>`;
                } catch (e) { } 
                return '';
            });

            // 3. Extract Charts
            markdownContent = markdownContent.replace(/<chart>([\s\S]*?)(<\/chart>|$)/g, (match, jsonStr, closeTag) => {
                if (!closeTag) return `<div class="mt-3 sm:mt-4 p-3 sm:p-4 border border-cyan-500/30 bg-cyan-500/5 rounded-lg text-cyan-400 text-[10px] sm:text-xs flex items-center gap-2 animate-pulse"><i class="ph ph-circle-notch animate-spin"></i> Rendering Data...</div>`;
                try {
                    const cleanJson = jsonStr.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const data = JSON.parse(cleanJson); 
                    const maxVal = Math.max(...data.map(d => d.value));
                    const barsHtml = data.map(item => `<div class="flex-1 flex flex-col items-center gap-1 sm:gap-2 group min-w-[20px]"><div class="w-full bg-gradient-to-t from-cyan-900/40 to-cyan-400 rounded-t-sm transition-all duration-1000 ease-out group-hover:to-cyan-300 relative chart-bar" style="height: ${(item.value / maxVal) * 100}%"><div class="opacity-0 group-hover:opacity-100 absolute -top-6 sm:-top-8 left-1/2 -translate-x-1/2 bg-white text-black text-[9px] sm:text-xs font-bold py-0.5 sm:py-1 px-1 sm:px-2 rounded transition-opacity z-10">${item.value}</div></div><span class="text-[8px] sm:text-[10px] text-gray-500 font-medium truncate w-full text-center px-0.5">${item.label}</span></div>`).join('');
                    extractedHtml += `<div class="extra-data-block w-full mt-3 sm:mt-4 mb-3 sm:mb-4 p-3 sm:p-5 bg-surface2 border border-white/5 rounded-xl shadow-xl overflow-hidden overflow-x-auto no-scrollbar"><div class="flex items-center gap-1.5 sm:gap-2 mb-4 sm:mb-6 text-[9px] sm:text-[10px] font-semibold tracking-widest text-gray-400 uppercase min-w-[200px]"><i class="ph-bold ph-chart-bar text-cyan-400 text-xs sm:text-sm"></i> Live Analysis</div><div class="flex items-end h-24 sm:h-32 gap-1 sm:gap-2 min-w-[200px]">${barsHtml}</div></div>`;
                } catch (e) { } 
                return '';

            const actionBarHtml = (!isStreaming && (markdownContent.trim().length > 0 || extractedHtml.length > 0) && msgId) ? `<div class="action-bar mt-3 sm:mt-4 flex items-center justify-end gap-3 sm:gap-4 border-t border-white/5 pt-2 sm:pt-3"><button onclick="copyToClipboard('${msgId}')" class="text-[10px] sm:text-xs font-medium text-gray-500 hover:text-cyan-400 flex items-center gap-1 transition-colors"><i class="ph-bold ph-copy text-sm"></i> Copy</button><button onclick="openPdfModal('${msgId}')" class="text-[10px] sm:text-xs font-medium text-gray-500 hover:text-cyan-400 flex items-center gap-1 transition-colors"><i class="ph-bold ph-download-simple text-sm"></i> Save PDF</button><span class="text-emerald-500 text-[9px] sm:text-[10px] flex items-center gap-1 ml-1 sm:ml-2 opacity-50"><i class="ph-bold ph-check-circle"></i> Chatini</span></div>` : '';
            return `<div class="prose prose-invert prose-sm sm:prose-base max-w-none text-gray-200">${marked.parse(markdownContent)}</div>${extractedHtml}${actionBarHtml}`;
        }

        function appendResearchTerminal() {

            div.innerHTML = `<div class="flex gap-3 sm:gap-4 w-full sm:max-w-[95%] lg:max-w-[90%]"><div class="w-7 h-7 sm:w-8 sm:h-8 flex-shrink-0 rounded-full bg-cyan-500/20 border border-cyan-500/50 flex items-center justify-center mt-1 shadow-[0_0_15px_rgba(6,182,212,0.3)] animate-pulse"><i class="ph-bold ph-radar text-cyan-400 text-sm sm:text-base"></i></div><div class="bg-black border border-cyan-500/30 rounded-xl p-4 w-full md:w-2/3 shadow-inner terminal-text text-xs sm:text-sm text-cyan-400 flex flex-col gap-2" id="research-logs"><div class="opacity-70"><i class="ph-bold ph-terminal-window"></i> Initializing Auto-Pilot...</div></div></div>`;

        function renderMessagesToUI() { els.container.innerHTML = ''; window.ARTIFACT_STORE = {}; messages.forEach(msg => appendMessage(msg.role, msg.content, msg.modelId, msg.id, msg.attachmentsMeta)); }

        async function handleSend() {
            const text = els.input.value.trim();
            if ((!text && pendingFiles.length === 0) || isProcessing) return;
            const attachmentsMeta = pendingFiles.map(f => ({ name: f.name, type: f.type }));
            const userMsgObj = appendMessage('user', text, null, null, attachmentsMeta);
            let payloadFiles = [...pendingFiles];
            if (messages.length === 0 && currentChatExtId) {
                const exts = await DB.getAll(); const activeExt = exts.find(e => e.id === currentChatExtId);
                if (activeExt && activeExt.files) payloadFiles = [...payloadFiles, ...activeExt.files];
            }
            const currentMessage = { role: 'user', content: text, id: userMsgObj.id, attachments: payloadFiles, attachmentsMeta: attachmentsMeta };
            messages.push(currentMessage);
            els.input.value = ''; els.input.style.height = 'auto'; pendingFiles = []; renderStagingArea();
            isProcessing = true; updateUIState();
            let compiledResearchContext = "";
            let contextMessages = messages.map(m => ({ role: m.role, content: m.content, attachments: m.id === currentMessage.id ? m.attachments : undefined }));
            
            if (isDeepResearchOn) {
                els.indicator.classList.add('hidden');
                const logContainer = appendResearchTerminal();
                try {
                    const res = await fetch('/api/research', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query: text }) });
                    const reader = res.body.getReader(); const decoder = new TextDecoder();
                    let buffer = "";
                    while (true) {
                        const { done, value } = await reader.read();
                        if (value) {
                            buffer += decoder.decode(value, { stream: true }); let lines = buffer.split('\n'); buffer = lines.pop();
                            for (const line of lines) {
                                if (line.startsWith('data: ')) {
                                    const dataStr = line.slice(6).trim(); if (!dataStr) continue;
                                    try {
                                        const data = JSON.parse(dataStr);
                                        if (data.log) { logContainer.innerHTML += `<div>> ${data.log}</div>`; els.canvas.scrollTop = els.canvas.scrollHeight; }
                                        if (data.done) { compiledResearchContext = data.context; logContainer.innerHTML += `<div class="text-emerald-400 mt-2">> Agent task finished. Compiling payload...</div>`; break; }
                                        if (data.error) { logContainer.innerHTML += `<div class="text-red-400">> Error: ${data.error}</div>`; break; }
                                    } catch (e) { }
                                }
                            }
                        }
                        if (done) break;
                    }
                    await new Promise(r => setTimeout(r, 1000));
                    logContainer.parentElement.parentElement.remove();
                } catch (err) { logContainer.innerHTML += `<div class="text-red-400">> Network Error establishing Agent stream.</div>`; await new Promise(r => setTimeout(r, 2000)); logContainer.parentElement.parentElement.remove(); }
            }

            if (!isDeepResearchOn) {
                const currentModel = CONFIG.models[activeModelId];
                els.indicatorIcon.className = `${currentModel.icon} ph-fill ${currentModel.color}`;
                els.indicatorText.textContent = currentChatExtId ? "Analyzing Extension..." : "Chatini is analyzing...";
                els.indicator.classList.remove('hidden'); els.canvas.scrollTop = els.canvas.scrollHeight;
            }
            try {
                if (currentChatExtId) {
                    const exts = await DB.getAll(); const activeExt = exts.find(e => e.id === currentChatExtId);
                    if (activeExt && activeExt.links && activeExt.links.length > 0) {
                        const compiledLinksText = activeExt.links.filter(l => l.text).map(l => `URL: ${l.url}\nData: ${l.text}`).join('\n\n');
                        if (compiledLinksText) contextMessages[0].content = `[SYSTEM: USE THIS EXTENSION KNOWLEDGE:]\n${compiledLinksText}\n\n[USER QUERY:]\n${contextMessages[0].content}`;
                    }
                }
                const response = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: contextMessages.slice(-200), modelId: activeModelId, researchContext: compiledResearchContext }) });
                els.indicator.classList.add('hidden');
                const assistantMsgObj = appendMessage('assistant', '', activeModelId);
                const contentContainer = assistantMsgObj.container;
                contentContainer.classList.add('typing-cursor');
                const reader = response.body.getReader(); const decoder = new TextDecoder();
                let fullResponse = ""; let buffer = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (value) {
                        buffer += decoder.decode(value, { stream: true }); let lines = buffer.split('\n'); buffer = lines.pop();
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const dataStr = line.slice(6).trim(); if (dataStr === '[DONE]') continue;
                                try {
                                    const data = JSON.parse(dataStr);
                                    if (data.ui_error) { fullResponse = `<span class="text-red-400 text-sm"><i class="ph-bold ph-warning-circle"></i> ${data.ui_error}</span>`; contentContainer.innerHTML = fullResponse; break; }
                                    let textChunk = ""; if (data.choices && data.choices[0].delta.content) textChunk = data.choices[0].delta.content; else if (data.candidates && data.candidates[0].content.parts[0].text) textChunk = data.candidates[0].content.parts[0].text;
                                    fullResponse += textChunk; contentContainer.innerHTML = parseRichText(fullResponse, true); els.canvas.scrollTop = els.canvas.scrollHeight;
                                } catch (e) { }
                            }
                        }
                    }
                    if (done) break;
                }
                contentContainer.classList.remove('typing-cursor'); contentContainer.innerHTML = parseRichText(fullResponse, false, assistantMsgObj.id);
                messages.push({ role: 'assistant', content: fullResponse, id: assistantMsgObj.id, modelId: activeModelId });
                saveCurrentChat();
            } catch (error) {
                els.indicator.classList.add('hidden');
                appendMessage('assistant', `<span class="text-red-400 text-sm">Network Error. Failed.</span>`, activeModelId);
            }
            isProcessing = false; updateUIState();
        }
        els.input.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; updateUIState(); });
        els.input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
        els.sendBtn.addEventListener('click', handleSend);
    </script>
</body>
