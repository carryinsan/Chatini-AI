<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexisAI Command Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { background: '#050505', surface: '#0a0a0a', surface2: '#121212' } } } }
    </script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #050505; color: white; }
        .glass-panel { background: rgba(10, 10, 10, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 1rem; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Glowing Background Elements -->
    <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-cyan-600/20 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-purple-600/20 blur-[120px] rounded-full pointer-events-none"></div>

    <!-- LOCK SCREEN -->
    <div id="lock-screen" class="glass-panel p-8 sm:p-12 max-w-md w-full w-11/12 z-10 flex flex-col items-center text-center shadow-2xl transition-all duration-500">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-cyan-500 to-purple-600 flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(6,182,212,0.4)]">
            <i class="ph-fill ph-shield-check text-3xl text-white"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-tight mb-2">LexisAI Security</h1>
        <p class="text-sm text-gray-400 mb-8">Enter Master Key to access telemetry data.</p>
        
        <input type="password" id="secret-key" placeholder="Enter Admin Secret..." class="w-full bg-[#050505] border border-white/10 rounded-xl px-4 py-3 text-white text-center focus:outline-none focus:border-cyan-500 transition-colors mb-4" onkeypress="if(event.key === 'Enter') unlockDashboard()">
        
        <button onclick="unlockDashboard()" id="unlock-btn" class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition-colors flex items-center justify-center gap-2">
            <i class="ph-bold ph-lock-key-open"></i> Unlock Dashboard
        </button>
        <p id="lock-error" class="text-red-400 text-xs mt-4 hidden"></p>
    </div>

    <!-- MAIN DASHBOARD (HIDDEN INITIALLY) -->
    <div id="dashboard" class="hidden absolute inset-0 w-full h-full z-20 flex flex-col overflow-y-auto">
        
        <!-- Header -->
        <header class="glass-panel m-4 md:m-6 flex items-center justify-between p-4 sticky top-4 z-30">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-cyan-500 to-purple-600 flex items-center justify-center"><i class="ph-fill ph-chart-line-up text-white"></i></div>
                <div><h1 class="text-sm font-bold tracking-widest uppercase">LexisAI Telemetry</h1></div>
            </div>
            <button onclick="fetchAnalytics()" class="text-sm bg-white/5 hover:bg-white/10 border border-white/10 px-4 py-2 rounded-lg flex items-center gap-2 transition-colors"><i class="ph-bold ph-arrows-clockwise"></i> Refresh</button>
        </header>

        <div class="flex-1 p-4 md:p-6 pt-0 space-y-6 max-w-7xl mx-auto w-full">
            
            <!-- TOP KPI METRICS -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass-panel p-5"><p class="text-xs text-gray-500 uppercase font-bold tracking-wider mb-1"><i class="ph-bold ph-activity text-cyan-400"></i> Total Traffic</p><h2 id="kpi-events" class="text-3xl font-black text-white">0</h2></div>
                <div class="glass-panel p-5"><p class="text-xs text-gray-500 uppercase font-bold tracking-wider mb-1"><i class="ph-bold ph-check-circle text-emerald-400"></i> Success Rate</p><h2 id="kpi-success" class="text-3xl font-black text-white">0%</h2></div>
                <div class="glass-panel p-5"><p class="text-xs text-gray-500 uppercase font-bold tracking-wider mb-1"><i class="ph-bold ph-warning-circle text-red-400"></i> Hard Errors</p><h2 id="kpi-errors" class="text-3xl font-black text-white">0</h2></div>
                <div class="glass-panel p-5"><p class="text-xs text-gray-500 uppercase font-bold tracking-wider mb-1"><i class="ph-bold ph-users text-purple-400"></i> Active Devices</p><h2 id="kpi-users" class="text-3xl font-black text-white">0</h2></div>
            </div>

            <!-- CHARTS ROW -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-panel p-5">
                    <h3 class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-4 border-b border-white/5 pb-2">Model Distribution</h3>
                    <div class="h-64 flex items-center justify-center relative"><canvas id="modelChart"></canvas></div>
                </div>
                <div class="glass-panel p-5">
                    <h3 class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-4 border-b border-white/5 pb-2">Feature Execution</h3>
                    <div class="h-64 w-full relative"><canvas id="featureChart"></canvas></div>
                </div>
            </div>

            <!-- DATA TABLES ROW -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- User Registry -->
                <div class="glass-panel p-5 flex flex-col max-h-[400px]">
                    <h3 class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-4 border-b border-white/5 pb-2">Recent User Registry</h3>
                    <div class="overflow-y-auto flex-1 no-scrollbar space-y-2" id="user-table"></div>
                </div>
                
                <!-- Live Event Feed -->
                <div class="glass-panel p-5 flex flex-col max-h-[400px]">
                    <h3 class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-4 border-b border-white/5 pb-2">Live Timeline</h3>
                    <div class="overflow-y-auto flex-1 no-scrollbar space-y-3" id="timeline-table"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSecret = '';
        let mChart, fChart;

        async function unlockDashboard() {
            const input = document.getElementById('secret-key');
            const btn = document.getElementById('unlock-btn');
            const err = document.getElementById('lock-error');
            
            if(!input.value.trim()) return;
            
            btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin"></i> Authenticating...`;
            err.classList.add('hidden');

            try {
                const res = await fetch('/api/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secretKey: input.value })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    currentSecret = input.value;
                    document.getElementById('lock-screen').classList.add('opacity-0', 'scale-95', 'pointer-events-none');
                    setTimeout(() => {
                        document.getElementById('lock-screen').classList.add('hidden');
                        document.getElementById('dashboard').classList.remove('hidden');
                        renderData(data);
                    }, 500);
                } else {
                    err.innerText = data.error || "Authentication failed.";
                    err.classList.remove('hidden');
                }
            } catch (e) {
                err.innerText = "Network error connecting to Secure Bridge.";
                err.classList.remove('hidden');
            }
            btn.innerHTML = `<i class="ph-bold ph-lock-key-open"></i> Unlock Dashboard`;
        }

        async function fetchAnalytics() {
            try {
                const res = await fetch('/api/admin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ secretKey: currentSecret }) });
                const data = await res.json();
                if(data.success) renderData(data);
            } catch (e) { console.error(e); }
        }

        function renderData(data) {
            const stats = data.stats;
            const total = stats.total_events || 0;
            const success = stats.total_success || 0;
            const errors = stats.total_errors || 0;
            
            // Render KPIs
            document.getElementById('kpi-events').innerText = total;
            document.getElementById('kpi-success').innerText = total > 0 ? Math.round((success / (success + errors)) * 100) + '%' : '0%';
            document.getElementById('kpi-errors').innerText = errors;
            document.getElementById('kpi-users').innerText = data.users.length;

            // Render Charts
            if(mChart) mChart.destroy();
            mChart = new Chart(document.getElementById('modelChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Spark (Groq)', 'Flux (Gemini)', 'Oracle (Deep)'],
                    datasets: [{
                        data: [stats.model_spark || 0, stats.model_flux || 0, stats.model_oracle || 0],
                        backgroundColor: ['#fbbf24', '#22d3ee', '#c084fc'],
                        borderWidth: 0, hoverOffset: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#ccc', font: {family: 'system-ui'} } } }, cutout: '70%' }
            });

            if(fChart) fChart.destroy();
            fChart = new Chart(document.getElementById('featureChart'), {
                type: 'bar',
                data: {
                    labels: ['Standard Chat', 'Deep Research', 'Slides', 'Maths'],
                    datasets: [{
                        label: 'Executions',
                        data: [stats.action_chat || 0, stats.action_research || 0, stats.action_slides || 0, stats.action_maths || 0],
                        backgroundColor: ['#3b82f6', '#0ea5e9', '#f59e0b', '#10b981'],
                        borderRadius: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { grid: {display: false}, ticks: {color: '#888', font:{family:'system-ui', size:10}} } }, plugins: { legend: { display: false } } }
            });

            // Render User Table
            const uTable = document.getElementById('user-table');
            uTable.innerHTML = data.users.map(u => `
                <div class="bg-black/50 p-3 rounded-xl border border-white/5 flex items-center justify-between">
                    <div>
                        <div class="text-sm font-bold text-white flex items-center gap-1.5"><i class="ph-fill ph-user-circle text-gray-500"></i> ${u.nickname || 'Unknown'}</div>
                        <div class="text-[10px] text-gray-500 mt-1">${u.deviceId}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-gray-400"><i class="ph-bold ph-device-mobile"></i> ${u.device || 'Browser'}</div>
                        <div class="text-[10px] text-cyan-500 mt-1"><i class="ph-bold ph-map-pin"></i> ${u.location || 'Unknown'}</div>
                    </div>
                </div>
            `).join('');

            // Render Timeline Feed
            const tTable = document.getElementById('timeline-table');
            tTable.innerHTML = data.timeline.map(t => {
                let color = 'text-gray-400', icon = 'ph-chat-circle';
                if(t.action === 'research') { color = 'text-cyan-400'; icon = 'ph-radar'; }
                if(t.action === 'slides') { color = 'text-amber-400'; icon = 'ph-presentation-chart'; }
                if(t.action === 'maths') { color = 'text-emerald-400'; icon = 'ph-function'; }
                if(t.status === 'error') { color = 'text-red-400'; icon = 'ph-warning-circle'; }

                const timeStr = new Date(t.ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                return `
                <div class="flex items-start gap-3 p-2 hover:bg-white/5 rounded-lg transition-colors border-l-2 border-transparent hover:border-${color.split('-')[1]}-500">
                    <div class="${color} mt-0.5"><i class="ph-bold ${icon}"></i></div>
                    <div class="flex-1">
                        <div class="flex justify-between items-baseline">
                            <span class="text-sm text-gray-300"><strong class="text-white">${t.nickname}</strong> triggered ${t.action}</span>
                            <span class="text-[10px] text-gray-600">${timeStr}</span>
                        </div>
                        <div class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Model: ${t.model || 'Unknown'} ${t.status === 'error' ? '<span class="text-red-400 ml-2">FAILED</span>' : ''}</div>
                    </div>
                </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
